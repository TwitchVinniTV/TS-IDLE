name: Build TS3 Plugin

on: [push, workflow_dispatch]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64
    - run: cl.exe /O2 /LD /Fe:TS3_Vinni_TV_Anti_AFK.dll plugin.cpp user32.lib
    - uses: actions/upload-artifact@v4
      with:
        name: TS3_Vinni_TV_Anti_AFK
        path: TS3_Vinni_TV_Anti_AFK.dll
